services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Override in a .env file or here. SQLite default needs no extra services.
      - DATABASE_URL=sqlite:///career_assistant.db
      - ALLOW_LIVE_APPLY=false
      - DEFAULT_JOB_SITES=indeed
      - LOG_LEVEL=INFO
      # - OPENAI_API_KEY=sk-...
    volumes:
      - ./data:/app/data

  # Optional Postgres for production-like runs. Set DATABASE_URL to use it:
  #   postgresql://career:career@db:5432/career
